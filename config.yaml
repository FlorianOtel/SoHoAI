# =============================================================================
# HomeAI-Lab Configuration
# =============================================================================

# -- Network ------------------------------------------------------------------
server1_ip: &server1_ip "192.168.1.93"
server2_ip: &server2_ip "192.168.1.95"

# -- Storage (NAS mount point) ------------------------------------------------
nas_mount: "/mnt/nfs/Florian/Gin-AI/projects/HomeAI-Lab"
# Change db_base_path to relocate all databases in one place.
# Python derives: {db_base_path}/sqlite/chats.db, {db_base_path}/sqlite/rag_state.db, {db_base_path}/qdrant/, {db_base_path}/redis/
# Note: redis.dir below must be updated manually if db_base_path changes (not auto-derived in Python).
db_base_path: "/mnt/nfs/__Backups/HomeAI-lab--databases"
rl_export_dir: "/mnt/nfs/Florian/Gin-AI/projects/HomeAI-Lab/rl-data"

# -- Redis (conversation short-term memory) ------------------------------------
redis:
  host: "127.0.0.1"  # Localhost - orchestrator and Redis on same server. (!!!) Neeed to specify localhost since redis is in protected mode. 
  port: 6379
  db: 0
  # Persist to NAS for reboot survival
  appendonly: true
  dir: "/mnt/nfs/__Backups/HomeAI-lab--databases/redis"
  default_ttl_seconds: 86400  # 24 hours

# -- LiteLLM Model Routing ----------------------------------------------------
# Default: external (Sonnet 4.6). Fallback: specialist (local Gemma) if cloud unreachable.
model_list:
  # --- Primary (interactive chat): Cloud inference ---
  - model_name: external
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      id: "external-claude"
      description: "Claude Sonnet 4.6 (primary) — interactive chat default"

  # --- Fallback: GPU inference on Server 2 ---
  - model_name: specialist
    litellm_params:
      model: openai/gemma4
      api_base: "http://${server2_ip}:8000/v1"
      api_key: "dummy-key"
    model_info:
      id: "specialist-llama-server"
      description: "Gemma 4 E4B Q8_0 — summarization, offline fallback, background"

# -- Routing Policy ------------------------------------------------------------
routing:
  default_model: "external"
  fallback_chain: ["external", "specialist"]
  # Route to cloud when context exceeds threshold.
  # Hard limit: -c 131072 (~128K tokens). At 120K we route to cloud,
  # leaving ~11K headroom for output (default max_tokens=1024 + safety margin).
  complexity_threshold_tokens: 120000
  cloud_model: "external"
  summarization_model: "specialist"

# -- RAG Settings (Phase 2 + §8 advanced features) ----------------------------
rag:
  embedding_model: "bge-m3"                      # 1024-dim, 8192-tok context, served by Ollama on Server 1
  # ollama_url: "http://192.168.1.93:11434/api/embeddings"   # Ollama on Server 1 (explicit IP — not localhost)
  ollama_url: "http://192.168.1.95:11434/api/embeddings"   # Ollama on Server 2 (explicit IP — not localhost)
  top_k: 5
  # Parent-child chunking (see RAG-strategy.md §3.4):
  #   child: 200-300 tokens (embedded), parent: 800-1200 tokens (returned to LLM)
  #   Flat 512-token for PPTX / short TXT / YAML / config files
  qdrant_collection: "documents"
  qdrant_url: "http://192.168.1.93:6333"         # Qdrant on Server 1 (local NVMe)
  # Active Qdrant storage: /var/lib/qdrant/storage (local NVMe, Server 1)
  # Snapshots (DR):        /mnt/nfs/__Backups/HomeAI-lab--databases/qdrant-snapshots/
  default_mode: "off"                            # off | on | only — server default for rag_mode (opt-in)

  # -- Tool-use loop (§8.2) ---------------------------------------------------
  tool_use:
    max_iterations: 2       # hard cap on tool-call round trips per user turn
    strip_on_final: true    # remove any stray <tool_call> tags from final answer

  # -- Multi-query retrieval + MMR (§8.3) -------------------------------------
  multi_query:
    enabled: false          # master toggle — start disabled; flip after benchmarking
    n_variants: 3           # LLM-generated rephrasings (plus the original = 4 queries)
    lambda: 0.5             # MMR relevance/diversity balance [0, 1]
    pool_multiplier: 4      # candidate pool size = pool_multiplier * top_k
    variant_model: "specialist"  # "specialist" or "external"

  # -- NFS scanner filters ------------------------------------------------------
  scanner:
    # File extensions to ingest (whitelist).
    include_extensions:
      - .pdf
      - .pptx
      - .docx
      - .md
      - .txt
      - .csv
      - .yaml
      - .yml
      - .ipynb
    # Directory names that os.walk will not descend into.
    exclude_dir_names:
      - .Gin-AI-python-3.12   # Python virtualenv
      - __pycache__
      - .git
      - node_modules
      - .claude
      - .vscode
      - .venv
      - Library  # macOS stuff
      - Applications # macOS stuff
      - LLMs-cache   # HuggingFace model cache — READMEs/licenses, not RAG content
      - Downloads # garbage
    # Directory name suffixes to skip (matched with str.endswith).
    exclude_dir_suffixes:
      - .dist-info             # pip package metadata
    # Substrings — any filename containing one of these is skipped.
    exclude_file_patterns:
      - "@synoeastream"        # Synology NAS streaming metadata

# -- Multi-user NFS roots (maps Google email → owner + NFS paths) -------------
users:
  florian.otel@gmail.com:
    owner: "florian"
    nfs_roots: ["/mnt/nfs/Florian"]
  # eva.otel@gmail.com
  # owner: "eva"
  # nfs_roots: ["/mnt/nfs/Eva"]
  # annika@example.com:
  # owner: "annika"
  # nfs_roots: ["/mnt/nfs/Annika"]
  # laura@example.com:
  # owner: "laura"
  # nfs_roots: ["/mnt/nfs/Laura"]
shared:
  owner: "la-familia"
  nfs_roots: ["/mnt/nfs/La-Familia"]

# -- llama-server native API (KV cache slot management) -----------------------
llama_server:
  base_url: "http://${server2_ip}:8000"
  # Must match --slot-save-path passed to llama-server on Server 2
  slot_save_path: "/mnt/nfs/Florian/Gin-AI/LLMs-cache/llama-server/k-v-caches/"
  # Number of parallel slots (must match --parallel N on llama-server).
  # Gemma 4 + f16 KV + 131072 ctx: ~2,088 MiB per slot (4 global KV layers + 20 SWA layers at 512-window).
  # New llama.cpp SWA-aware implementation: f16 uses same VRAM as old q8_0 but with better precision.
  num_slots: 2
  timeout_seconds: 120

# -- Chat Persistence ----------------------------------------------------------
chat:
  max_turns_in_context: 50
  export_format: "markdown"  # markdown | jsonl
  # Rolling summarization: when total Redis context size exceeds threshold,
  # summarize older turns and keep only the most recent N turns verbatim.
  # ~400K chars ≈ 100K tokens (4 chars/token). Hard limit is 131072 tokens;
  # 100K input + 1024 output = ~101K, leaving ~30K safety margin.
  summarize_threshold_chars: 400000
  summarize_keep_turns: 20
