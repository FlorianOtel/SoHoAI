    - path: /home/florian/.claude/projects
      owner: florian

# -- llama-server native API (KV cache slot management) -----------------------
llama_server:
  base_url: "http://${server2_ip}:8000"
  # Must match --slot-save-path passed to llama-server on Server 2
  slot_save_path: "/mnt/nfs/Florian/Gin-AI/LLMs-cache/llama-server/k-v-caches/"
  # Number of parallel slots (must match --parallel N on llama-server).
  # Gemma 4 + f16 KV + 110024 ctx: ~1,760 MiB per slot (4 global KV layers + 20 SWA layers at 512-window).
  # New llama.cpp SWA-aware implementation: f16 uses same VRAM as old q8_0 but with better precision.
  num_slots: 2
  timeout_seconds: 120

# -- Chat Persistence ----------------------------------------------------------
chat:
  max_turns_in_context: 50
  export_format: "markdown"  # markdown | jsonl
  # Rolling summarization: when total Redis context size exceeds threshold,
  # summarize older turns and keep only the most recent N turns verbatim.
  # ~400K chars ≈ 100K tokens (4 chars/token). Hard limit is 110024 tokens per slot;
  # 100K input + 1024 output = ~101K, leaving ~9K safety margin.
  summarize_threshold_chars: 400000
  summarize_keep_turns: 20

# -- Local model shadow pricing (informational only; NOT read by any code) ------
# litellm.completion_cost() returns 0.0 for local models (correct — no API cost).
# This block is a placeholder for future electricity-cost estimates if needed.
local_model_pricing:
  gemma-4-e4b:
    cost_per_million_input_tokens: 0.0    # no API cost
    cost_per_million_output_tokens: 0.0
    notes: "Gemma 4 E4B 7.52B Q8_0 on RTX 5070; electricity cost not tracked"
