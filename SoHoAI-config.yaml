# =============================================================================
# SoHoAI Configuration
# =============================================================================

# -- Network ------------------------------------------------------------------
server1_ip: &server1_ip "192.168.1.93"
server2_ip: &server2_ip "192.168.1.95"

# -- Storage (NAS mount point) ------------------------------------------------
nas_mount: "/mnt/nfs/Florian/Gin-AI/projects/SoHoAI"
# Change db_base_path to relocate all databases in one place.
# Python derives: {db_base_path}/sqlite/telemetry.db, {db_base_path}/sqlite/rag_state.db, {db_base_path}/qdrant/, {db_base_path}/redis/
# Note: redis.dir below must be updated manually if db_base_path changes (not auto-derived in Python).
db_base_path: "/mnt/nfs/__Backups/SoHoAI--databases"
rl_export_dir: "/mnt/nfs/Florian/Gin-AI/projects/SoHoAI/rl-data"

# -- Redis (conversation short-term memory) ------------------------------------
redis:
  host: "127.0.0.1"  # Localhost - orchestrator and Redis on same server. (!!!) Neeed to specify localhost since redis is in protected mode. 
  port: 6379
  db: 0
  # Persist to NAS for reboot survival
  appendonly: true
  dir: "/mnt/nfs/__Backups/SoHoAI--databases/redis"
  default_ttl_seconds: 86400  # 24 hours


# -- Proxy access control -------------------------------------------------------
proxy:
  # Models listed here are refused at /v1/messages with HTTP 400.
  # Prevents CC from auto-spawning Haiku subagents when the main model is a
  # claude-code-* (Ollama Cloud) model, which would incur unexpected Anthropic cost.
  blocked_models:
    - claude-haiku-4-5-20251001

litellm_settings: {}

# LiteLLM Model Routing ----------------------------------------------------
model_list:
  #### First use-case: interactive chat, and local actor/implementer -- local LLM on GPU inference on Server 2
  #### Note, this is loaded via llama-swap by default -- TTL 0sec (always resident unless evicted) 
  - model_name: "local/qwen3-4b-q6"
    litellm_params:
      model: openai/qwen3.5-4b-q6
      api_base: "http://${server2_ip}:8000/v1"
      api_key: "dummy-key"
    model_info:
      id: "local/qwen3-4b-q6"
      description: "Qwen3.5-4B-UD-Q6_K_XL -- local implementer model "
      # Advertised context window: per-slot capacity with "--ctx-size 262144 --parallel 2"
      # 262144 / 2 = 131072. This is what external clients (Cline, Claude Code) read via
      # /proxy/v1/model/info for their contextWindow setting.
      max_tokens: 131072
      max_input_tokens: 131072
      context_window: 131072


  #### Second use-case: summarize, and emergency local fallback -- local LLM on GPU inference on Server 2
  #### Note, this is loaded via llama-swap only when needed, TTL of 300sec
  - model_name: "local/qwen3-9b-q4"
    litellm_params:
      model: openai/qwen3.5-9b-q4
      api_base: "http://${server2_ip}:8000/v1"
      api_key: "dummy-key"
    model_info:
      id: "local/qwen3-9b-q4"
      description: "Qwen3.5-9B-UD-Q4_K_XL -- local chat model "
      # Hybrid attention (full_attention_interval=4): 8/32 layers are full-attention.
      # Effective KV/token (q8_0, full-attn layers only) = 2×8×4×256×1.0625 = 17,408 bytes.
      # At 262144 ctx → ~4.25 GB KV + ~6.4 GB weights ≈ 10.8 GB total → fits in 12 GB.
      max_tokens: 262144
      max_input_tokens: 262144
      context_window: 262144

  ####
  #### Models consumed transparently by CC — auth is client-side (OAuth or x-api-key).
  #### No api_key here: the gateway relays bytes unchanged via _anthropic_messages_forward().
  #### model_info IS needed: proxy consumers (Cline, OpenCode) read it via /proxy/v1/model/info.
  ####

  - model_name: "anthropic/claude-haiku-4-5"
    litellm_params:
      model: anthropic/claude-haiku-4-5
    model_info:
      id: "anthropic/claude-haiku-4-5"
      description: "Claude Haiku 4.5 — CC transparent forward. No API key configured."
      max_tokens: 200000
      max_input_tokens: 200000
      context_window: 200000

  - model_name: "anthropic/claude-sonnet-4-6"
    litellm_params:
      model: anthropic/claude-sonnet-4-6
    model_info:
      id: "anthropic/claude-sonnet-4-6"
      description: "Claude Sonnet 4.6 — CC transparent forward. No API key configured."
      max_tokens: 1000000
      max_input_tokens: 999000
      context_window: 1000000

  - model_name: "anthropic/claude-opus-4-7"
    litellm_params:
      model: anthropic/claude-opus-4-7
    model_info:
      id: "anthropic/claude-opus-4-7"
      description: "Claude Opus 4.7 — CC transparent forward. No API key configured."
      max_tokens: 1000000
      max_input_tokens: 999000
      context_window: 1000000

  ####
  #### Models exposed to proxy clients (Cline, OpenCode) — auth via SoHoAI's ANTHROPIC_API_KEY.
  #### Bare names (no provider prefix) so _PROXY_EXPOSED_MODELS can route anthropic/ → these.
  ####

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      context_window: 1000000
      max_input_tokens: 1000000

  - model_name: "ollama-cloud/deepseek-v4-pro"
    litellm_params:
      model: openai/deepseek-v4-pro:cloud
      api_base: https://ollama.com/v1
      api_key: os.environ/OLLAMA_API_KEY
    model_info:
      id: "ollama-cloud/deepseek-v4-pro"
      description: "DeepSeek V4 Pro — Ollama Cloud"
      max_tokens: 32000
      max_input_tokens: 1000000
      context_window: 1000000

  - model_name: "ollama-cloud/kimi-k2.6"
    litellm_params:
      model: openai/kimi-k2.6:cloud
      api_base: https://ollama.com/v1
      api_key: os.environ/OLLAMA_API_KEY
    model_info:
      id: "ollama-cloud/kimi-k2.6"
      description: "Kimi K2.6 — Ollama Cloud"
      max_tokens: 32000
      max_input_tokens: 256000
      context_window: 256000

  - model_name: "ollama-cloud/glm-5.1"
    litellm_params:
      model: openai/glm-5.1:cloud
      api_base: https://ollama.com/v1
      api_key: os.environ/OLLAMA_API_KEY
    model_info:
      id: "ollama-cloud/glm-5.1"
      description: "GLM 5.1 — Ollama Cloud"
      max_tokens: 32000
      max_input_tokens: 200000
      context_window: 200000

  - model_name: "ollama-cloud/qwen3-coder-next"
    litellm_params:
      model: openai/qwen3-coder-next:cloud
      api_base: https://ollama.com/v1
      api_key: os.environ/OLLAMA_API_KEY
    model_info:
      id: "ollama-cloud/qwen3-coder-next"
      description: "Qwen3 Coder Next — Ollama Cloud"
      max_tokens: 32000
      max_input_tokens: 262000
      context_window: 262000


# -- Routing Policy ------------------------------------------------------------
routing:
  default_model: "local/qwen3-4b-q6"
  #### Fallback chains are now implemented via "router_settings" above. Leaving this commented anyway. 
  # Fallback for local actor -> Ollama-cloud
  # fallback_chain: ["local/qwen3-4b-q6", "ollama-cloud/qwen3-coder-next"]
  # Fallback for Ollama-cloud when throttled 
  # fallback_chain: ["anthropic/claude-sonnet-4-6", "ollama-cloud/kimi-k2.6"]
  # Route to cloud when context exceeds threshold.
  # Hard limit: -c 220048 / 2 = 110024 tokens per slot. At 100K we route to cloud,
  # leaving ~10K headroom for output (default max_tokens=1024 + safety margin).
  complexity_threshold_tokens: 100000
  cloud_model: "ollama-cloud/kimi-k2.6"
  summarization_model: "local/qwen3-9b-q4"


#### --- LiteLLM  configuration --- 
#### Implements fallbacks 
router_settings:
  routing_strategy: simple-shuffle
  # Each item in this list is an independent fallback rule
  fallbacks:
    - "local/qwen3-4b-q6": ["ollama-cloud/qwen3-coder-next"]
    - "anthropic/claude-sonnet-4-6": ["ollama-cloud/kimi-k2.6"]
    - "ollama-cloud/kimi-k2.6": ["local/qwen3-9b-q4"]


#### -- RAG Settings (Phase 2 + §8 advanced features) ----------------------------
rag:
  embedding_model: "bge-m3"                      # 1024-dim, 8192-tok context, served by Ollama on Server 1
  # ollama_url: "http://192.168.1.93:11434/api/embeddings"   # Ollama on Server 1 (explicit IP — not localhost)
  ollama_url: "http://192.168.1.95:11434/api/embeddings"   # Ollama on Server 2 (explicit IP — not localhost)
  top_k: 5
  # Parent-child chunking (see RAG-strategy.md §3.4):
  #   child: 200-300 tokens (embedded), parent: 800-1200 tokens (returned to LLM)
  #   Flat 512-token for PPTX / short TXT / YAML / config files
  qdrant_collection: "documents"
  qdrant_url: "http://192.168.1.93:6333"         # Qdrant on Server 1 (local NVMe)
  # Active Qdrant storage: /var/lib/qdrant/storage (local NVMe, Server 1)
  # Snapshots (DR):        /mnt/nfs/__Backups/SoHoAI--databases/qdrant-snapshots/
  default_mode: "off"                            # off | on | only — server default for rag_mode (opt-in)

  # -- Ingestion lock (shared across servers via NFS) ---------------------------
  # NFSv4.1 + local_lock=none forwards flock() to the NAS lock manager, making
  # this cross-machine. Both rag_ingest_daemon.py and rag-ingest-run.sh read this.
  ingest_lock: "/mnt/nfs/__Backups/SoHoAI--databases/rag-ingest.lock"

  # -- Tool-use loop (§8.2) ---------------------------------------------------
  tool_use:
    max_iterations: 2       # hard cap on tool-call round trips per user turn
    strip_on_final: true    # remove any stray <tool_call> tags from final answer

  # -- Multi-query retrieval + MMR (§8.3) -------------------------------------
  # Evaluated 2026-04-22: no-go verdict. Standard single-query retrieval is
  # sufficient for this corpus. Do not enable.
  multi_query:
    enabled: false          # permanently disabled — no-go verdict 2026-04-22
    n_variants: 3
    lambda: 0.5
    pool_multiplier: 4
    variant_model: "local/qwen3-4b"

  # -- Cross-encoder reranking (§13) -----------------------------------------
  rerank:
    enabled: true                             # on by default; override via ?rerank=false or --no-rerank
    server_url: "http://192.168.1.95:8001/v1/rerank"
    model: "bge-reranker-v2-m3"
    fetch_multiplier: 6                       # Qdrant fetch = min(top_k * fetch_multiplier, fetch_cap)
    fetch_cap: 30                             # hard cap on Qdrant fetch pool
    timeout_seconds: 10.0                     # per-request HTTP timeout
    # Reranker server launched with -c 768 -b 768 for consistent context and batch handling.
    # Client does not truncate; server handles all typical queries and child chunks.

  # -- Hybrid sparse+dense retrieval (§14) -----------------------------------
  hybrid:
    enabled: true                             # default on; override per-call via hybrid=False
    sparse_vector_name: "sparse_text"
    dense_fetch: 30                           # candidates from dense prefetch branch
    sparse_fetch: 30                          # candidates from sparse prefetch branch
    rrf_k: 60                                 # RRF constant k (standard: 60)

  # -- NFS scanner filters ------------------------------------------------------
  scanner:
    # File extensions to ingest (whitelist).
    include_extensions:
      - .pdf
      - .pptx
      - .docx
      - .md
      - .sh
      - .txt
      - .csv
      - .yaml
      - .yml
      - .ipynb
      - .html
      - .jsonl # Claude chats 
    # Directory names/paths that os.walk will not descend into.
    # All entries MUST have a trailing slash. Single-component entries (e.g. "Library/")
    # match any directory with that exact name at any depth. Multi-component entries
    # (e.g. "Microsoft--flotel/Documents/") match only that exact path-segment sequence.
    # Matching uses endswith("/" + pattern) so "Library/" won't match "PublicLibrary/".
    exclude_dir_names:
      - ".Gin-AI-python-3.12/"  # Python virtualenv
      - "__pycache__/"
      - ".git/"
      - "node_modules/"
      - ".claude/" 
      - ".vscode/"
      - ".venv/"
      - "Library/"              # macOS stuff
      - "Applications/"         # macOS stuff
      - "LLMs-cache/"           # HuggingFace model cache — READMEs/licenses, not RAG content
      - "Downloads/"            # garbage
      - "Microsoft--flotel/Documents/"  # IRM/DRM-encrypted old PPTs — unrecoverable
    # Directory name suffixes to skip (matched with str.endswith).
    exclude_dir_suffixes:
      - .dist-info             # pip package metadata
    # Substrings — any filename containing one of these is skipped.
    exclude_file_patterns:
      - "@synoeastream"        # Synology NAS streaming metadata
      - "._"                   # macOS AppleDouble resource fork sidecars (e.g. ._foo.pptx) —
                               # created automatically by macOS on non-HFS+ filesystems (NFS/Synology);
                               # same extension as the real file but binary metadata, not parseable
      - "~$"                   # Microsoft Office lock/temp files (e.g. ~$foo.pptx) —
                               # created while a document is open; tiny binary lock stubs, not real docs

